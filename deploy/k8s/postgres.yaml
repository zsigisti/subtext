apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: subtext-db-data
  namespace: subtext
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
  # k3s ships local-path as the default StorageClass; omit to use the default.
  # storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subtext-db
  namespace: subtext
  labels: { app: subtext-db }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: subtext-db }
  template:
    metadata:
      labels: { app: subtext-db }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef: { name: subtext-secret }
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: subtext-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: subtext-db
  namespace: subtext
spec:
  selector: { app: subtext-db }
  ports:
    - port: 5432
      targetPort: 5432
