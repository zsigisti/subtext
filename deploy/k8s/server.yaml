apiVersion: apps/v1
kind: Deployment
metadata:
  name: subtext-server
  namespace: subtext
  labels: { app: subtext-server }
spec:
  # Keep at 1: the entrypoint runs `prisma db push` on start. Scale up only
  # after switching to a migration job.
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: subtext-server }
  template:
    metadata:
      labels: { app: subtext-server }
    spec:
      containers:
        - name: server
          # Replace OWNER with your registry/user (e.g. ghcr.io/zsigisti).
          image: ghcr.io/OWNER/subtext-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: subtext-config }
            - secretRef: { name: subtext-secret }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: subtext-server
  namespace: subtext
spec:
  selector: { app: subtext-server }
  ports:
    - port: 3000
      targetPort: 3000
