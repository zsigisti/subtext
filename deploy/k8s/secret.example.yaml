# Copy to secret.yaml and fill in real values. DO NOT commit secret.yaml.
#   cp secret.example.yaml secret.yaml && $EDITOR secret.yaml
#
# Generate a session secret:  openssl rand -hex 32
# Postgres password / DATABASE_URL must agree with each other.
apiVersion: v1
kind: Secret
metadata:
  name: subtext-secret
  namespace: subtext
type: Opaque
stringData:
  # Must match POSTGRES_PASSWORD below.
  DATABASE_URL: "postgresql://subtext:CHANGE_ME_DB_PASSWORD@subtext-db:5432/subtext?schema=public"
  SESSION_SECRET: "CHANGE_ME_run_openssl_rand_hex_32"
  # Leave empty to stay in mock mode; set a real key + flip GEMINI_MOCK=0.
  GEMINI_API_KEY: ""
  # Postgres init credentials.
  POSTGRES_USER: "subtext"
  POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD"
  POSTGRES_DB: "subtext"
