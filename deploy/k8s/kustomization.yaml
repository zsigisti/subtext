apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: subtext

resources:
  - namespace.yaml
  - config.yaml
  - secret.yaml # create from secret.example.yaml (gitignored)
  - postgres.yaml
  - server.yaml
  - web.yaml
  - ingress.yaml

# Set your registry/user + image tag in one place:
#   kustomize edit set image ghcr.io/OWNER/subtext-server=ghcr.io/zsigisti/subtext-server:v1
images:
  - name: ghcr.io/OWNER/subtext-server
    newName: ghcr.io/OWNER/subtext-server
    newTag: latest
  - name: ghcr.io/OWNER/subtext-web
    newName: ghcr.io/OWNER/subtext-web
    newTag: latest
